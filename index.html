<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BREAKOUT — Deutsch</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div id="pauseOverlay">
    <div id="pauseBox">
      <h2>II &nbsp; Pause</h2>
      <button class="pBtn accent" onclick="resumeGame()">▶ &nbsp; Resume</button>
      <button class="pBtn" onclick="openMatch()">⇄ &nbsp; Skip level — Match the words</button>
      <button class="pBtn"
        onclick="document.getElementById('pauseOverlay').classList.remove('open'); showLeaderboard()">🏆 &nbsp;
        Leaderboard</button>
      <button class="pBtn" onclick="restartGame()">↺ &nbsp; Restart game</button>
    </div>
  </div>

  <div id="matchOverlay">
    <div id="matchBox">
      <h2>Match the words</h2>
      <div class="sub">Connect each German word with its translation — first try for bonus!</div>
      <div id="matchGrid">
        <div class="mCol" id="colDE"></div>
        <div class="mCol" id="colUA"></div>
      </div>
      <div id="matchResult"></div>
      <button id="matchClose" style="display:none" onclick="closeMatch()">Continue →</button>
    </div>
  </div>

  <div id="lbOverlay">
    <div id="lbBox">
      <h2>🏆 &nbsp; Leaderboard</h2>
      <div id="lbList"></div>
      <button class="pBtn accent" onclick="closeLeaderboard(); restartGame()">↺ &nbsp; Play again</button>
      <button class="pBtn" onclick="closeLeaderboard()">✕ &nbsp; Close</button>
    </div>
  </div>

  <div id="card">
    <div id="header">
      <div class="label">Breakout · Deutsch</div>
      <div id="tabs">
        <span>Best <b id="bestVal">0</b></span> &nbsp;
        <span>Lvl <b id="levelVal">1</b></span> &nbsp;
        <span>Score <b id="scoreVal">0</b></span>
      </div>
    </div>
    <div id="wordDisplay">
      <span class="wtype" id="wType"></span>
      <span id="wWord"></span>
    </div>
    <div id="wordTranslation"></div>
    <div id="wordExample"></div>
    <div id="bigScore">+<span id="bigScoreVal">000</span> <sup>pts</sup></div>
    <div class="divider"></div>
    <canvas id="gameCanvas" width="472" height="300"></canvas>
    <div id="footer">
      <span>LVL <b id="f-level">01</b> &nbsp; LIVES <b id="f-lives">■■■</b></span>
      <span id="f-status">ACTIVE</span>
    </div>
  </div>

  <div id="message"></div>
  <div id="btnWrap"><button id="restartBtn" onclick="restartGame()">› RESTART</button></div>
  <div id="hint">← → mouse · SPACE = pause · клік = магніт/пауза · ESC = menu</div>

  <script src="js/constants.js"></script>
  <script src="js/words.js"></script>
  <script src="js/font.js"></script>
  <script src="js/hud.js"></script>
  <script src="js/bonus.js"></script>
  <script src="js/physics.js"></script>
  <script src="js/render.js"></script>
  <script src="js/match.js"></script>
  <script src="js/game.js"></script>
</body>

</html>
